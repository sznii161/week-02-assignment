<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 페이지</title>
</head>
<body>
    <h1>안녕하세요! 저는 이유진입니다.</h1>

    <p>컴퓨터공학을 공부하고 있는 학생입니다.</p>
    <p>프로그래밍과 새로운 기술을 배우는 것을 좋아합니다.</p>

    <img src="myphoto.jpg" alt="내 사진" width="200">

    <h2>이름</h2>
    <input type="text" placeholder="이름을 입력하세요">

    <h2>소개글</h2>
    <textarea rows="5" cols="30" placeholder="자기소개를 입력하세요"></textarea>
</body>
</html>
